<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & mobile ─────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vii-Mbuni" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Theme & branding ─────────────────────────────── -->
    <meta name="theme-color" content="#c8102e" />
    <meta name="msapplication-TileColor" content="#c8102e" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="application-name" content="Vii-Mbuni" />
    <meta name="description" content="Chat. Learn. Connect. The Sayawa community social platform." />

    <!-- ── Icons ─────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/icons/icon-128.png" />
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- ── PWA Manifest ──────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph (for link sharing) ────────────────── -->
    <meta property="og:title" content="Vii-Mbuni" />
    <meta property="og:description" content="Chat. Learn. Connect." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />

    <title>Vii-Mbuni</title>

    <!-- ── PWA Deep Link: redirect browser → installed app ──────────── -->
    <script>
      (function () {
        // If already running as standalone PWA, do nothing
        var isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true ||
          document.referrer.includes('android-app://')
        if (isStandalone) return

        // Check if user has installed the app (we store the date on install)
        var installed = null
        try { installed = localStorage.getItem('vii-install-date') } catch (_) {}
        if (!installed) return

        // App is installed but user opened a link in the browser.
        // Redirect to the same path with ?source=pwa so the OS/browser
        // can hand off to the installed PWA (via launch_handler in manifest).
        var url = new URL(window.location.href)
        if (!url.searchParams.has('source')) {
          url.searchParams.set('source', 'pwa')
          window.location.replace(url.toString())
        }
      })()
    </script>

    <!-- ── Fonts ─────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
