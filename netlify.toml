[build]
command = "npm ci && npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "18"
# SECRETS_SCAN_ENABLED removed — Netlify secret scanning re-enabled for safety.
# If a specific key causes a false positive, use SECRETS_SCAN_OMIT_KEYS below
# instead of disabling the entire scan.
SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_URL,SUPABASE_SERVICE_KEY,GROQ_API_KEY,VAPID_PRIVATE_KEY,VAPID_PUBLIC_KEY,WEBHOOK_SECRET,VITE_WEBHOOK_SECRET"

[functions]
node_bundler = "esbuild"
# web-push must be bundled (not external) — it uses native crypto that esbuild handles fine
external_node_modules = ["@supabase/supabase-js"]

# Redirects are handled by public/_redirects for reliability

# ─── Global security headers ────────────────────────────────────────────────
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
# FIXED: Removed 'unsafe-eval' (enables XSS escalation) and tightened CSP.
# If you use any runtime eval() you will need a nonce-based approach instead.
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.supabase.in https://lh3.googleusercontent.com; media-src 'self' blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co wss://*.supabase.in https://api.groq.com https://*.metered.ca https://*.metered.live https://vii-mbuni.metered.live https://openrelay.metered.ca; worker-src 'self' blob:; frame-ancestors 'none'"

# ─── Netlify function CORS ───────────────────────────────────────────────────
# FIXED: Replaced wildcard '*' with your specific domain.
# This prevents other websites from calling your functions on behalf of your users.
[[headers]]
for = "/.netlify/functions/*"
[headers.values]
Access-Control-Allow-Origin = "https://vii-mbuni.netlify.app"
Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"
Access-Control-Allow-Headers = "Content-Type, Authorization, x-webhook-secret"

# ─── Static asset caching ───────────────────────────────────────────────────
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
X-Content-Type-Options = "nosniff"

[[headers]]
for = "/icons/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# ─── Service worker — must never be cached ──────────────────────────────────
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Service-Worker-Allowed = "/"

# ─── PWA manifest ───────────────────────────────────────────────────────────
[[headers]]
for = "/manifest.json"
[headers.values]
Cache-Control = "public, max-age=86400"

# ─── Root — no cache, preload CSS ───────────────────────────────────────────
[[headers]]
for = "/"
[headers.values]
Cache-Control = "no-cache"
Link = "</assets/index.css>; rel=preload; as=style"

# ─── Dictionary asset ───────────────────────────────────────────────────────
[[headers]]
for = "/zaarDict.json"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
X-Content-Type-Options = "nosniff"

[build.processing]
skip_processing = false

[[plugins]]
package = "@netlify/plugin-functions-install-core"

# ─── Scheduled function ─────────────────────────────────────────────────────
[functions."word-of-week"]
schedule = "0 8 * * 1"

# ─── Android asset links ────────────────────────────────────────────────────
[[headers]]
for = "/.well-known/assetlinks.json"
[headers.values]
Content-Type = "application/json"
Cache-Control = "public, max-age=3600"
