<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8102e" />
  <title>Vii-Mbuni — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p  { color: rgba(255,255,255,0.5); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #c8102e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" class="logo" alt="Vii-Mbuni" />
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection detected.<br/>Some cached content may still be available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
